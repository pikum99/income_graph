<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>年収モデル</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  body { font-family: 'Helvetica Neue', sans-serif; background: #0f1117; color: #e0e0e0; margin: 0; padding: 20px; }
  h2 { text-align: center; color: #7eb8f7; margin-bottom: 4px; }
  .subtitle { text-align: center; color: #888; font-size: 12px; margin-bottom: 24px; line-height: 1.8; }
  .container { max-width: 860px; margin: 0 auto; }
  .chart-box { background: #1a1d27; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  .controls { background: #1a1d27; border-radius: 12px; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .control-item label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; }
  .control-item .val { font-size: 18px; font-weight: bold; color: #7eb8f7; margin-bottom: 8px; }
  input[type=range] { width: 100%; accent-color: #7eb8f7; }
  .formula { text-align: center; background: #1a1d27; border-radius: 12px; padding: 16px; font-size: 13px; color: #aaa; line-height: 2; }
  .annotation { font-size: 12px; color: #666; text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <h2>年収の時定数モデル</h2>
  <div class="subtitle">
    能力(t) = 能力初期値 + 成長率 × t<br>
    年収(t) = 能力(t) × (証明力 + (1 − 証明力) × (1 − e<sup>−t/τ</sup>))
  </div>

  <div class="controls">
    <div class="control-item">
      <label>能力（初期値）― 素の実力</label>
      <div class="val" id="val-ability">80</div>
      <input type="range" id="ability" min="10" max="100" value="80" step="5">
    </div>
    <div class="control-item">
      <label>能力の成長率（線形の傾き）</label>
      <div class="val" id="val-growth">2</div>
      <input type="range" id="growth" min="0" max="10" value="2" step="1">
    </div>
    <div class="control-item">
      <label>証明力 ― 初期年収のオフセット</label>
      <div class="val" id="val-proof">10</div>
      <input type="range" id="proof" min="0" max="100" value="10" step="5">
    </div>
    <div class="control-item">
      <label>τ（信頼蓄積の遅さ）</label>
      <div class="val" id="val-tau">3</div>
      <input type="range" id="tau" min="1" max="10" value="3" step="1">
    </div>
  </div>

  <div class="chart-box">
    <canvas id="myChart"></canvas>
    <div class="annotation">横軸：実績の積み上がり（t）　縦軸：年収（万円）</div>
  </div>

  <div class="formula">
    証明力が高い → 実績ゼロでも高い年収からスタート &nbsp;|&nbsp; 証明力が低い → 実績が積み上がるにつれて能力(t)に近づく<br>
    τ が小さい → 信頼が早く積み上がる（スタートアップ的）&nbsp;|&nbsp; τ が大きい → 信頼蓄積に時間がかかる（研究職・大企業的）
  </div>
</div>

<script>
const ctx = document.getElementById('myChart').getContext('2d');
const XS = Array.from({length: 61}, (_, i) => i * 0.2);
const SCALE = 10;

function getValues() {
  return {
    ability: parseInt(document.getElementById('ability').value),
    growth:  parseInt(document.getElementById('growth').value),
    proof:   parseInt(document.getElementById('proof').value),
    tau:     parseInt(document.getElementById('tau').value),
  };
}

function calcSeries(v) {
  const proofRate = v.proof / 100;
  const income = XS.map(x => {
    const abilityT = (v.ability + v.growth * x) * SCALE;
    return abilityT * (proofRate + (1 - proofRate) * (1 - Math.exp(-x / v.tau)));
  });
  const abilityLine = XS.map(x => (v.ability + v.growth * x) * SCALE);
  return { income, abilityLine };
}

let chart;

function buildChart() {
  const v = getValues();
  const { income, abilityLine } = calcSeries(v);
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: XS.map(x => x.toFixed(1)),
      datasets: [
        {
          label: '年収(t)',
          data: income,
          borderColor: '#7eb8f7',
          backgroundColor: 'rgba(126,184,247,0.1)',
          fill: true,
          tension: 0.4,
          pointRadius: 0,
          borderWidth: 2.5,
        },
        {
          label: '能力(t) の上限線',
          data: abilityLine,
          borderColor: '#f7b87e',
          borderDash: [6, 4],
          pointRadius: 0,
          borderWidth: 1.5,
          fill: false,
        }
      ]
    },
    options: {
      responsive: true,
      animation: { duration: 200 },
      plugins: {
        legend: { labels: { color: '#aaa', font: { size: 12 } } },
        tooltip: { callbacks: { label: c => `${c.dataset.label}: ${Math.round(c.raw)}万円` } }
      },
      scales: {
        x: {
          ticks: { color: '#666', maxTicksLimit: 10 },
          grid: { color: '#2a2d3a' },
          title: { display: true, text: '実績の積み上がり（t）', color: '#666' }
        },
        y: {
          ticks: { color: '#666', callback: val => val + '万' },
          grid: { color: '#2a2d3a' },
          min: 0,
          title: { display: true, text: '年収（万円）', color: '#666' }
        }
      }
    }
  });
}

function updateChart() {
  const v = getValues();
  const { income, abilityLine } = calcSeries(v);
  document.getElementById('val-ability').textContent = v.ability;
  document.getElementById('val-growth').textContent  = v.growth;
  document.getElementById('val-proof').textContent   = v.proof;
  document.getElementById('val-tau').textContent     = v.tau;
  chart.data.datasets[0].data = income;
  chart.data.datasets[1].data = abilityLine;
  chart.update();
}

buildChart();
['ability', 'growth', 'proof', 'tau'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateChart);
});
</script>
</body>
</html>
